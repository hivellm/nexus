name: Build and publish Nexus Server releases
permissions:
  contents: write
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., server-v1.14.0)"
        required: true
        type: string

# Resolve the release tag once so every job sees the same value:
#   - `release:published` → github.ref_name holds the tag
#   - `workflow_dispatch`  → the free-form `tag` input above
#
# Downstream steps consume `${{ env.RELEASE_TAG }}` for checkout, and
# `refs/tags/${{ env.RELEASE_TAG }}` when an action demands a full ref.
env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Linux GNU builds
  build-linux-x86_64-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib clang cmake
          rustup default stable
          rustup update
      - name: Build and publish nexus-server
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: nexus-server
          manifest_path: crates/nexus-server/Cargo.toml
          target: x86_64-unknown-linux-gnu
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # Linux MUSL builds (static binaries)
  build-linux-x86_64-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib clang cmake musl-tools
          rustup default stable
          rustup update
          rustup target add x86_64-unknown-linux-musl
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build musl binary with cross
        run: |
          cd crates/nexus-server
          cross build --release --target x86_64-unknown-linux-musl --no-default-features
          mkdir -p ../../dist
          cp ../../target/x86_64-unknown-linux-musl/release/nexus-server ../../dist/nexus-server-x86_64-unknown-linux-musl
      - name: Upload musl binary
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true
          file_glob: true
      - name: Build Debian Package
        run: |
          cargo install cargo-deb
          cd crates/nexus-server
          cross build --release --target x86_64-unknown-linux-musl --no-default-features
          cargo deb --no-build --no-strip --target x86_64-unknown-linux-musl
      - name: Upload Debian package
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/x86_64-unknown-linux-musl/debian/*.deb
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true
          file_glob: true

  # Linux ARM64 MUSL build
  build-linux-aarch64-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib clang cmake
          rustup default stable
          rustup update
          rustup target add aarch64-unknown-linux-musl
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build musl binary with cross
        run: |
          cd crates/nexus-server
          cross build --release --target aarch64-unknown-linux-musl --no-default-features
          mkdir -p ../../dist
          cp ../../target/aarch64-unknown-linux-musl/release/nexus-server ../../dist/nexus-server-aarch64-unknown-linux-musl
      - name: Upload musl binary
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true
          file_glob: true

  # macOS builds
  build-mac-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install dependencies
        run: |
          brew update-reset
          brew install gcc cmake
          rustup default stable
          rustup update
          rustup show
          cargo -Vv
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Build and publish nexus-server
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: nexus-server
          manifest_path: crates/nexus-server/Cargo.toml
          target: ${{ matrix.target }}
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # Windows builds
  build-windows-binaries:
    runs-on: windows-latest
    steps:
      - name: Install minimal stable
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cd crates/nexus-server && cargo build --release
      - name: Build and publish nexus-server
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: nexus-server
          manifest_path: crates/nexus-server/Cargo.toml
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
