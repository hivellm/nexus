name: Helm chart

on:
  push:
    branches: [main, "release/*"]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-lint.yml"
      - "scripts/tests/helm-template.sh"
      - "scripts/tests/helm_static_check.py"
      - "scripts/tests/helm-kind-smoke.sh"
  pull_request:
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm-lint.yml"
      - "scripts/tests/helm-template.sh"
      - "scripts/tests/helm_static_check.py"
      - "scripts/tests/helm-kind-smoke.sh"

permissions:
  contents: read

jobs:
  lint:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install pyyaml
        run: pip install pyyaml==6.0.2

      - name: static structural check (helm-free)
        run: python scripts/tests/helm_static_check.py --chart deploy/helm/nexus --repo .

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: helm lint (default values)
        run: helm lint deploy/helm/nexus

      - name: helm lint (cluster preset)
        run: helm lint deploy/helm/nexus -f deploy/helm/nexus/values-cluster.yaml

      - name: helm template smoke (default + cluster + full)
        run: bash scripts/tests/helm-template.sh

      - name: kubeconform validation
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          args: >-
            -summary
            -strict
            -ignore-missing-schemas
            -kubernetes-version 1.29.0
            -schema-location default
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{ .Group }}/{{ .ResourceKind }}_{{ .ResourceAPIVersion }}.json'
            /github/workspace/.helm-rendered.yaml

  kind-smoke:
    name: kind end-to-end smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.23.0
          cluster_name: nexus-helm
          wait: 120s

      - name: load Nexus image into kind
        run: |
          # The release image isn't on Docker Hub from CI's perspective,
          # so build from this checkout and side-load it. Use the
          # repository's existing Dockerfile.
          docker build -t hivehub/nexus:ci-${{ github.sha }} .
          kind load docker-image hivehub/nexus:ci-${{ github.sha }} --name nexus-helm

      - name: kind smoke install + helm test
        env:
          IMAGE_TAG: ci-${{ github.sha }}
        run: bash scripts/tests/helm-kind-smoke.sh
