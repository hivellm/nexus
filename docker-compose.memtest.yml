# Docker Compose for Nexus memory profiling.
#
# Hard memory cap of 512 MB with swap disabled: any leak manifests as
# OOMKilled (visible via `docker inspect`) instead of exhausting the host.
#
# Usage:
#   docker compose -f docker-compose.memtest.yml up --build -d
#   bash scripts/memtest/run-all.sh <tag>       # e.g. baseline, phase1, phase2
#   docker compose -f docker-compose.memtest.yml down -v

services:
  nexus-memtest:
    build:
      context: .
      dockerfile: Dockerfile.memtest
    image: nexus-memtest:latest
    container_name: nexus-memtest
    ports:
      - "15474:15474"
    volumes:
      - nexus-memtest-data:/app/data
      - ./config/memtest.yml:/app/config/memtest.yml:ro
    environment:
      # Priority: env vars > config.yml > compiled defaults. The YAML
      # path below is the subset currently honoured by
      # Config::from_yaml_file (server + storage.{data_dir, page_cache}).
      - RUST_LOG=info,nexus_core=info,nexus_server=info
      - NEXUS_CONFIG_PATH=/app/config/memtest.yml
      - NEXUS_ADDR=0.0.0.0:15474
      - NEXUS_DATA_DIR=/app/data
      - NEXUS_AUTH_ENABLED=false
    mem_limit: 512m
    memswap_limit: 512m            # disable swap so OOM is hard-fail, not silent degradation
    oom_kill_disable: false
    restart: "no"                  # do not auto-restart on OOM — we want the failure visible
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15474/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  nexus-memtest-data:
    driver: local
