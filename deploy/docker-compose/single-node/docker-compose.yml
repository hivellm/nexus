# Single-node Nexus stack.
#
# Usage:
#   cd deploy/docker-compose/single-node
#   echo "$(openssl rand -hex 32)" > root_password.txt && chmod 600 root_password.txt
#   docker compose up -d
#   curl http://localhost:15474/health

services:
  nexus:
    image: ${NEXUS_IMAGE:-hivehub/nexus:latest}
    container_name: nexus
    restart: unless-stopped
    ports:
      - "15474:15474"   # HTTP API
      - "15475:15475"   # Native binary RPC (SDK default)
    volumes:
      - nexus-data:/app/data
    environment:
      NEXUS_ADDR: 0.0.0.0:15474
      NEXUS_DATA_DIR: /app/data
      NEXUS_RPC_ENABLED: "true"
      NEXUS_RPC_ADDR: 0.0.0.0:15475
      NEXUS_RPC_REQUIRE_AUTH: "true"
      NEXUS_AUTH_ENABLED: "true"
      NEXUS_AUTH_REQUIRED_FOR_PUBLIC: "true"
      NEXUS_REQUIRE_HEALTH_AUTH: "false"
      NEXUS_ROOT_ENABLED: "true"
      NEXUS_ROOT_USERNAME: ${NEXUS_ROOT_USERNAME:-admin}
      NEXUS_ROOT_PASSWORD_FILE: /run/secrets/nexus_root_password
      NEXUS_DISABLE_ROOT_AFTER_SETUP: "true"
      RUST_LOG: ${RUST_LOG:-info}
    secrets:
      - nexus_root_password
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15474/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nexus-data:
    driver: local

secrets:
  nexus_root_password:
    file: ./root_password.txt
