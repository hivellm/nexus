version: '3.8'

services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus
    ports:
      # HTTP API
      - "15474:15474"
      # Native binary RPC (`nexus://`), the SDK-default transport
      # since phase2_sdk-rpc-transport-default. Comment out or set
      # `[rpc].enabled = false` in config.yml for HTTP-only deployments.
      - "15475:15475"
    volumes:
      - nexus-data:/app/data
      - ./config:/app/config:ro
    environment:
      # Root user configuration
      - NEXUS_ROOT_USERNAME=${NEXUS_ROOT_USERNAME:-admin}
      - NEXUS_ROOT_PASSWORD_FILE=/run/secrets/nexus_root_password
      - NEXUS_ROOT_ENABLED=${NEXUS_ROOT_ENABLED:-true}
      - NEXUS_DISABLE_ROOT_AFTER_SETUP=${NEXUS_DISABLE_ROOT_AFTER_SETUP:-true}
      
      # Authentication configuration
      - NEXUS_AUTH_ENABLED=${NEXUS_AUTH_ENABLED:-true}
      - NEXUS_AUTH_REQUIRED_FOR_PUBLIC=${NEXUS_AUTH_REQUIRED_FOR_PUBLIC:-true}
      
      # Server configuration
      - NEXUS_ADDR=0.0.0.0:15474
      - NEXUS_DATA_DIR=/app/data
      - RUST_LOG=${RUST_LOG:-info}
    secrets:
      - nexus_root_password
    restart: unless-stopped
    healthcheck:
      # Distroless image: no curl / grep. Bash built-ins only.
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/127.0.0.1/15474 && printf 'GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && read -r line <&3 && [[ \"$$line\" == *'200 OK'* ]]"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nexus-data:
    driver: local

secrets:
  nexus_root_password:
    file: ./secrets/root_password.txt

